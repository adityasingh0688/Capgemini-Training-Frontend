<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>

    <link rel="stylesheet" href="ProductInventoryManagment.css">
</head>

<body>

    <h1>Product Inventory Management System</h1>

    <div class="container">

        <div class="form-section">
            <h2>Add Product</h2>
            <input type="text" id="name" placeholder="Product Name">
            <input type="text" id="category" placeholder="Category">
            <input type="number" id="price" placeholder="Price">
            <input type="number" id="quantity" placeholder="Quantity">
            <button id="addBtn">Add Product</button>
        </div>

        <div class="filter-section">
            <input type="text" id="searchBox" placeholder="Search Product">
            <select id="categoryFilter">
                <option value="All">All Categories</option>
            </select>
            <input type="number" id="minPrice" placeholder="Min Price">
            <input type="number" id="maxPrice" placeholder="Max Price">
            <button id="filterBtn">Filter</button>
        </div>

        <div class="stats">
            <div class="card">
                <h3>Total Inventory Value</h3>
                <p id="inventoryValue"></p>
            </div>

            <div class="card">
                <h3>Total Operations</h3>
                <p id="operationCount"></p>
            </div>
        </div>

        <div id="loading" class="loading hidden">Loading...</div>
        <div id="alertSection"></div>
        <div id="productContainer" class="product-grid"></div>

    </div>
    <script src="ProductInventoryManagment.js"></script>

</body>
</html>
