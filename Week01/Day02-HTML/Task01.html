<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1 style="text-align: center;">Student Registration Form</h1>
    <form method="post" action="" nonvalidate>
        <h3>Basic Details</h3>
        <fieldset>
        <legend>Basic Details</legend>
        <p>
            <label for="firstName">First Name :</label>
            <input type="text" id="firstName" name="firstName" required>
            <label for="lastName">LastName :</label>
            <input type="text" id="lastName" name="lastName" required>
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required>
        </p>
        <p>
            <label for="city">Select City :</label>
            <select id="city" name="city" size="5" required>
                <option value="Jammu & Kashmir">Jammu & Kashmir</option>
                <option value="Himachal Pradesh">Himachal Pradesh</option>
                <option value="Punjab">Punjab</option>
                <option value="Uttarakhand">Uttarakhand</option>
                <option value="Haryana">Haryana</option>
                <option value="Delhi">Delhi</option>
                <option value="Rajasthan">Rajasthan</option>
                <option value="Uttar Pradesh" selected>Uttar Pradesh</option>
                <option value="Bihar">Bihar</option>
            </select>
        </p>
        </fieldset>
        <fieldset>
        <legend>Introduction</legend>
        <p >
            <label for="introduction">Write a short introduction about yourself :</label><br>
            <textarea id="introduction" name="introduction" rows="5" cols="3">My Name is XYZ...</textarea>
        </p>
        </fieldset>
        <p>
            <label for="gender">Gender :</label>
            <label for="gender">Male</label>
            <input type="radio" id="gender" name="gender" value="male" checked>
            <label for="gender">Female</label>
            <input type="radio" id="gender" name="gender" value="female">
            <label for="gender">Other</label> 
            <input type="radio" id="gender" name="gender" value="other">              
        </p>
        <p>
            <button type="button" onclick="alert('Fill all the fields')">Click Me</button>
        </p>

        <h3>Educational Details</h3>
        <fieldset>
        <legend>Educational Details</legend>
         <p>
        <label for="education">Education:</label>
        <select id="education" name="education" required>
            <option value="">Select</option>
            <option value="highschool">High School</option>
            <option value="bachelor">Bachelor</option>
            <option value="master">Master</option>
        </select>
        </p>
    <p>
        <label for="experience">Experience:</label>
        <input type="text" id="experience" name="experience" required>
    </p>

    <p>
        <label for="skill">Skill:</label>
        <input list="skills" id="skill" name="skill">
        <datalist id="skills">
            <option value="HTML">
            <option value="CSS">
            <option value="JavaScript">
            <option value="Angular">
        </datalist>
    </p>
    </fieldset>

    <fieldset>
    <legend>Terms & Conditions</legend>
    <input type="checkbox" id="terms" name="terms" required>
    <label for="terms">I agree to the terms</label>
    </fieldset>
    </form>
</body>
</html>
