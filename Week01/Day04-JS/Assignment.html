<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JS Pattern Challenge</title>
    <link rel="stylesheet" href="Assignment.css">
</head>

<body>
    <h1>Tricky Pattern & Number Challenge</h1>
<main>
     <fieldset>
        <legend>Number Pyramid</legend>
        <p>Enter A number between 1 & 10:</p>
        <input type="number" id="pyramidInput" placeholder="Enter 1-10">
        <button onclick="generatePyramid()">Generate</button>
        <div class="result" id="pyramidResult"></div>
    </fieldset>
    

    <fieldset>
        <legend>FizzBuzz Table</legend>
        <p>Enter A number between 10 and 100:</p>
        <input type="number" id="fizzInput" placeholder="Enter 10-100">
        <button onclick="generateFizzBuzz()">Generate</button>
        <div class="result" id="fizzResult"></div>
    </fieldset>


    <fieldset>
        <legend>Smart Sum Calculator</legend>
        <p>Enter A number between 5 and 50:</p>
        <input type="number" id="sumInput" placeholder="Enter 5-50">
        <button onclick="generateSum()">Generate</button>
        <div class="result" id="sumResult"></div>
    </fieldset>
   
    <fieldset>
        <legend> Reverse Pyramid</legend>
        <p>Enter A number between 5 and 15:</p>
        <input type="number" id="reverseInput" placeholder="Enter 5-15">
        <button onclick="generateReverse()">Generate</button>
        <div class="result" id="reverseResult"></div>
    </fieldset>
</main>

    <script src="Assignment.js"></script>

</body>

</html>
